name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=critical

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  hostile-containment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check sandbox images exist
        id: check
        run: |
          if [ -d infra/sandbox/python312 ] && [ -d infra/sandbox/node22 ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.check.outputs.present == 'true'
      - name: Build sandbox images
        if: steps.check.outputs.present == 'true'
        run: |
          docker build -t sandbox-python312 infra/sandbox/python312
          docker build -t sandbox-node22 infra/sandbox/node22
      - name: Run hostile-submission containment suite
        if: steps.check.outputs.present == 'true'
        run: npm run test:hostile
