name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: code_challenger
          POSTGRES_PASSWORD: ci_superuser_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d code_challenger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DB: code_challenger
      POSTGRES_SUPERUSER_PASSWORD: ci_superuser_pw
      DATABASE_URL_MIGRATOR: postgres://migrator_role:ci_migrator_pw@localhost:5432/code_challenger
      DATABASE_URL_API: postgres://api_role:ci_api_pw@localhost:5432/code_challenger
      DATABASE_URL_WORKER: postgres://worker_role:ci_worker_pw@localhost:5432/code_challenger
      SESSION_COOKIE_SECRET: ci_session_cookie_secret_at_least_32_chars
      API_PORT: 3000
      WEB_PORT: 5173
      APP_ORIGIN: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run db:migrate
      - run: npm test
      - run: npm audit --audit-level=critical

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  hostile-containment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check sandbox images exist
        id: check
        run: |
          if [ -d infra/sandbox/python312 ] && [ -d infra/sandbox/node22 ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.check.outputs.present == 'true'
      - name: Build sandbox images
        if: steps.check.outputs.present == 'true'
        run: |
          docker build -t sandbox-python312 infra/sandbox/python312
          docker build -t sandbox-node22 infra/sandbox/node22
      - name: Run hostile-submission containment suite
        if: steps.check.outputs.present == 'true'
        run: npm run test:hostile
